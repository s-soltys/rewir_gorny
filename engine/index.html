<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewir Górny — Interactive Narrative</title>
  <meta name="description" content="An interactive narrative game set in the concrete veins of Upper Silesia, 1996. Navigate a crumbling post-industrial landscape through internal monologue, sensory perception, and dialogue.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <!-- Phaser renders its canvas into this container -->
  <div id="game-container"></div>

  <div id="ui-toggles">
    <button id="toggle-quests-btn" class="ui-btn">Quests</button>
    <button id="toggle-inventory-btn" class="ui-btn">Inventory</button>
  </div>

  <div id="side-panels" class="hidden">
    <div id="quest-panel" class="status-panel"></div>
    <div id="inventory-panel" class="status-panel"></div>
  </div>

  <!-- Right-side dialogue panel (overlaid on game canvas) -->
  <div id="ui-panel">
    <div id="panel-header">
      <h1 id="panel-title">Rewir Górny</h1>
      <div id="panel-subtitle">Osiedle Górne, 1996</div>
    </div>
    <div id="dialogue-scroll">
      <div id="dialogue-content"></div>
    </div>
  </div>

  <!-- Location indicator badge (top-left overlay) -->
  <div id="scene-badge"></div>

  <!-- Hidden audio element for TTS voice playback -->
  <audio id="global-audio"></audio>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
